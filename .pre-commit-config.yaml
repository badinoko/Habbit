default_install_hook_types:
  - pre-commit
  - pre-push

default_stages:
  - pre-commit

repos:
  # Базовые проверки файлов
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace  # убирает лишние пробелы
      - id: end-of-file-fixer     # добавляет новую строку в конце
      - id: check-yaml             # проверяет YAML синтаксис
      - id: check-toml             # проверяет TOML синтаксис
      - id: check-added-large-files # проверяет большие файлы (README screenshots в assets/ длинные full-page)
        exclude: ^assets/

  # Ruff - линтинг и форматирование
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2  # актуальная версия на момент установки
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]  # автоисправление
      - id: ruff-format

  # Mypy - проверка типов в том же окружении, что и локальный make check
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: poetry run mypy src --explicit-package-bases
        language: system
        pass_filenames: false
      - id: tests-pre-push
        name: tests-pre-push
        entry: make test-pre-push
        language: system
        pass_filenames: false
        always_run: true
        stages:
          - pre-push

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>HabitFlow — Вход</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;800&family=Onest:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #1A1F36; --accent: #6C63FF; --accent2: #8B84FF;
  --mint: #00C9A7; --danger: #FF6B6B;
  --bg: #F4F5FA; --surface: #FFFFFF; --border: #E8EAF0;
  --text: #1A1F36; --muted: #8A90A8; --nav-h: 58px;
}
body { font-family: 'Onest', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

nav {
  position: sticky; top: 0; z-index: 100; background: var(--navy);
  height: var(--nav-h); display: flex; align-items: center; padding: 0 28px; gap: 32px;
}
.nav-logo { font-family: 'Unbounded', sans-serif; font-size: 14px; font-weight: 700; color: #fff; letter-spacing: -.2px; display: flex; align-items: center; gap: 9px; text-decoration: none; }
.nav-logo-dot { width: 28px; height: 28px; border-radius: 8px; background: linear-gradient(135deg, var(--accent), var(--mint)); display: flex; align-items: center; justify-content: center; font-size: 13px; color: #fff; }
.nav-links { display: flex; gap: 4px; flex: 1; }
.nav-link { color: rgba(255,255,255,.55); font-size: 13.5px; font-weight: 500; text-decoration: none; padding: 6px 13px; border-radius: 7px; display: flex; align-items: center; gap: 6px; transition: color .15s, background .15s; }
.nav-link:hover { color: #fff; background: rgba(255,255,255,.08); }
.nav-cta { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.nav-btn-login {
  display: flex; align-items: center; gap: 6px; padding: 7px 16px; border-radius: 8px;
  font-family: 'Onest', sans-serif; font-size: 13px; font-weight: 600;
  background: rgba(108,99,255,.25); border: 1.5px solid rgba(108,99,255,.4);
  color: #fff; cursor: pointer; text-decoration: none; transition: background .15s;
}
.nav-btn-login:hover { background: rgba(108,99,255,.4); }

/* demo switcher */
.demo-bar { background: var(--navy); border-bottom: 1px solid rgba(255,255,255,.08); display: flex; align-items: center; justify-content: center; gap: 8px; padding: 8px; }
.demo-btn { padding: 5px 16px; border-radius: 7px; font-family: 'Onest', sans-serif; font-size: 12.5px; font-weight: 600; border: 1.5px solid rgba(255,255,255,.2); background: transparent; color: rgba(255,255,255,.5); cursor: pointer; transition: all .15s; }
.demo-btn.active { background: rgba(108,99,255,.4); border-color: var(--accent2); color: #fff; }

/* auth layout */
.auth-wrap {
  min-height: calc(100vh - var(--nav-h) - 41px);
  display: flex; align-items: center; justify-content: center;
  padding: 40px 20px;
  background: radial-gradient(ellipse at 60% 20%, rgba(108,99,255,.07) 0%, transparent 60%),
              radial-gradient(ellipse at 20% 80%, rgba(0,201,167,.05) 0%, transparent 50%);
}

.auth-card {
  width: 100%; max-width: 440px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 36px 36px 32px;
  box-shadow: 0 8px 40px rgba(26,31,54,.08);
}

.auth-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 700; letter-spacing: .7px; text-transform: uppercase;
  padding: 4px 12px; border-radius: 20px; margin-bottom: 18px;
}
.auth-badge.login { background: rgba(108,99,255,.1); color: var(--accent); border: 1px solid rgba(108,99,255,.2); }
.auth-badge.register { background: rgba(0,201,167,.1); color: var(--mint); border: 1px solid rgba(0,201,167,.2); }

.auth-title { font-family: 'Unbounded', sans-serif; font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 8px; line-height: 1.2; }
.auth-sub { font-size: 13.5px; color: var(--muted); margin-bottom: 28px; line-height: 1.5; }

.form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.form-label { font-size: 13px; font-weight: 600; color: var(--text); }
.input-wrap { position: relative; }
.input-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }
.form-input {
  width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
  padding: 11px 14px 11px 38px;
  font-family: 'Onest', sans-serif; font-size: 14px; color: var(--text);
  background: var(--bg); transition: border-color .15s, background .15s; outline: none;
}
.form-input:focus { border-color: var(--accent); background: #fff; }
.form-input::placeholder { color: var(--muted); }

.pw-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 2px; }
.pw-toggle:hover { color: var(--text); }

.btn-submit {
  width: 100%; padding: 13px; border-radius: 10px; border: none; cursor: pointer;
  font-family: 'Onest', sans-serif; font-size: 14.5px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin-top: 8px; margin-bottom: 20px; transition: opacity .15s;
}
.btn-submit:hover { opacity: .9; }
.btn-submit.login-btn { background: linear-gradient(135deg, var(--accent), #8B5CF6); color: #fff; }
.btn-submit.register-btn { background: linear-gradient(135deg, var(--mint), #00A98C); color: #fff; }

.auth-divider { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.auth-divider span { font-size: 12px; color: var(--muted); font-weight: 500; white-space: nowrap; }

.btn-google {
  width: 100%; padding: 11px; border-radius: 10px;
  border: 1.5px solid var(--border); background: var(--surface);
  font-family: 'Onest', sans-serif; font-size: 13.5px; font-weight: 600; color: var(--text);
  display: flex; align-items: center; justify-content: center; gap: 9px;
  cursor: pointer; transition: background .15s, border-color .15s;
  margin-bottom: 22px;
}
.btn-google:hover { background: var(--bg); border-color: #C0C4D8; }
.google-icon { width: 18px; height: 18px; }

.auth-footer { text-align: center; font-size: 13.5px; color: var(--muted); }
.auth-footer a { color: var(--accent); font-weight: 600; text-decoration: none; }
.auth-footer a:hover { text-decoration: underline; }

/* error alert */
.alert-error { display: flex; align-items: flex-start; gap: 10px; background: rgba(255,107,107,.08); border: 1px solid rgba(255,107,107,.25); border-radius: 10px; padding: 12px 14px; margin-bottom: 18px; font-size: 13px; color: #C0392B; }
.alert-error i { margin-top: 1px; flex-shrink: 0; }

.form-panel { display: none; }
.form-panel.active { display: block; }
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">
    <div class="nav-logo-dot"><i class="fa-solid fa-chart-line"></i></div>
    HabitFlow
  </a>
  <div class="nav-links">
    <a href="#" class="nav-link"><i class="fa-regular fa-circle-check"></i> Задачи</a>
    <a href="#" class="nav-link"><i class="fa-solid fa-arrow-trend-up"></i> Привычки</a>
    <a href="#" class="nav-link"><i class="fa-solid fa-chart-bar"></i> Статистика</a>
  </div>
  <div class="nav-cta">
    <a href="#" class="nav-btn-login"><i class="fa-solid fa-right-to-bracket"></i> Вход</a>
  </div>
</nav>

<div class="demo-bar">
  <span style="color:rgba(255,255,255,.4);font-size:12px;margin-right:4px">Экран:</span>
  <button class="demo-btn active" onclick="show('login', this)">Вход</button>
  <button class="demo-btn" onclick="show('register', this)">Регистрация</button>
</div>

<div class="auth-wrap">

  <!-- LOGIN -->
  <div class="form-panel active" id="panel-login">
    <div class="auth-card">
      <div class="auth-badge login"><i class="fa-solid fa-shield-halved"></i> Безопасный вход</div>
      <div class="auth-title">Войти в HabitFlow</div>
      <div class="auth-sub">Используйте email и пароль.</div>

      <!-- error state (скрыт по умолчанию) -->
      <!-- <div class="alert-error"><i class="fa-solid fa-circle-exclamation"></i> Неверный email или пароль. Попробуйте снова.</div> -->

      <div class="form-group">
        <label class="form-label">Email</label>
        <div class="input-wrap">
          <i class="input-icon fa-regular fa-envelope"></i>
          <input type="email" class="form-input" placeholder="you@example.com">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Пароль</label>
        <div class="input-wrap">
          <i class="input-icon fa-solid fa-lock"></i>
          <input type="password" class="form-input" id="pw-login" placeholder="Введите пароль">
          <button class="pw-toggle" onclick="togglePw('pw-login', this)"><i class="fa-regular fa-eye"></i></button>
        </div>
      </div>

      <button class="btn-submit login-btn"><i class="fa-solid fa-right-to-bracket"></i> Войти</button>

      <div class="auth-divider"><span>или войдите через</span></div>

      <button class="btn-google">
        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Продолжить с Google
      </button>

      <div class="auth-footer">Нет аккаунта? <a href="#" onclick="show('register', document.querySelectorAll('.demo-btn')[1]); return false">Создать</a></div>
    </div>
  </div>

  <!-- REGISTER -->
  <div class="form-panel" id="panel-register">
    <div class="auth-card">
      <div class="auth-badge register"><i class="fa-solid fa-user-plus"></i> Новый аккаунт</div>
      <div class="auth-title">Создать аккаунт</div>
      <div class="auth-sub">Используйте уникальный email и пароль длиной не менее 8 символов.</div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <div class="input-wrap">
          <i class="input-icon fa-regular fa-envelope"></i>
          <input type="email" class="form-input" placeholder="you@example.com">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Пароль</label>
        <div class="input-wrap">
          <i class="input-icon fa-solid fa-lock"></i>
          <input type="password" class="form-input" id="pw-reg" placeholder="Минимум 8 символов">
          <button class="pw-toggle" onclick="togglePw('pw-reg', this)"><i class="fa-regular fa-eye"></i></button>
        </div>
      </div>

      <button class="btn-submit register-btn"><i class="fa-solid fa-user-plus"></i> Зарегистрироваться</button>

      <div class="auth-divider"><span>или зарегистрируйтесь через</span></div>

      <button class="btn-google">
        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Продолжить с Google
      </button>

      <div class="auth-footer">Уже есть аккаунт? <a href="#" onclick="show('login', document.querySelectorAll('.demo-btn')[0]); return false">Войти</a></div>
    </div>
  </div>

</div>

<script>
function show(type, btn) {
  document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.demo-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + type).classList.add('active');
  if (btn) btn.classList.add('active');
}
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  const isText = inp.type === 'text';
  inp.type = isText ? 'password' : 'text';
  btn.innerHTML = isText ? '<i class="fa-regular fa-eye"></i>' : '<i class="fa-regular fa-eye-slash"></i>';
}
</script>
</body>
</html>

name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  POETRY_VERSION: "2.1.3"

jobs:
  pre-commit:
    name: Lint / pre-commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Run pre-commit
        run: poetry run pre-commit run --all-files

  tests:
    name: Tests / coverage
    runs-on: ubuntu-latest
    needs: pre-commit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Run tests
        run: make test

      - name: Upload coverage / test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            coverage.xml
            junit.xml
          if-no-files-found: ignore
          retention-days: 14

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build image
        run: docker build -t app:${{ github.sha }} .

      - name: Save image as artifact
        run: docker save app:${{ github.sha }} | gzip > app-image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: app-image.tar.gz
          retention-days: 7

  docker-smoke:
    name: Docker smoke test
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: docker-image

      - name: Load image
        run: gunzip -c app-image.tar.gz | docker load

      - name: Smoke test image
        run: docker run --rm --entrypoint python app:${{ github.sha }} --version

  migration-smoke:
    name: Migration smoke test
    runs-on: ubuntu-latest
    needs: tests

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://app:app@localhost:5432/app_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Run migration smoke test
        run: |
          poetry run alembic upgrade head
          poetry run alembic downgrade base

  security-python:
    name: Security / pip-audit
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Install export plugin
        run: poetry self add poetry-plugin-export

      - name: Export requirements
        run: poetry export --without-hashes --format=requirements.txt -o requirements.txt

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Audit dependencies
        run: pip-audit -r requirements.txt

  security-container:
    name: Security / container scan
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: docker-image

      - name: Load image
        run: gunzip -c app-image.tar.gz | docker load

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: app:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

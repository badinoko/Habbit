{% extends "base.html" %}

{% block content %}
<div class="list-page">
    <div class="page-header">
        <h1>
            {% block page_icon %}{% endblock %}
            {% block page_title %}Список{% endblock %}
        </h1>
        <a href="{% block create_url %}#{% endblock %}" class="btn btn-primary">
            <i class="fas fa-plus"></i>
            {% block create_button_text %}Добавить{% endblock %}
        </a>
    </div>

    {% block filters %}{% endblock %}

    <div class="list-container">
        {% block list_content %}
        <!-- Контент списка будет здесь -->
        {% endblock %}
    </div>
</div>
{% endblock %}
